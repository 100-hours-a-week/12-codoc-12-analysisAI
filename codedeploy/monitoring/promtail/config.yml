server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /var/lib/promtail/positions.yaml

clients:
  - url: ${LOKI_URL}/loki/api/v1/push
    tenant_id: ${LOKI_TENANT_ID:-1}

scrape_configs:
  - job_name: analysis-docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    pipeline_stages:
      - docker: {}
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: /analysis_api_server
        action: keep
      - target_label: job
        replacement: analysis
      - target_label: env
        replacement: ${ENV:-dev}
      - target_label: instance
        replacement: ${monitor_hostname}
      - target_label: compose_service
        replacement: app-analysis

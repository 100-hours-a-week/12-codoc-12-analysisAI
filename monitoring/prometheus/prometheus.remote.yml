global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  # analysis API metrics endpoint (/metrics) from autoscaled EC2 targets
  - job_name: analysis-api
    metrics_path: /metrics
    ec2_sd_configs:
      - region: __AWS_REGION__
        port: 8010
        filters:
          - name: tag:__EC2_TAG_KEY__
            values:
              - __EC2_TAG_VALUE__
    relabel_configs:
      - source_labels: [__meta_ec2_instance_state]
        regex: running
        action: keep
      - source_labels: [__meta_ec2_private_ip]
        regex: (.+)
        replacement: ${1}:8010
        target_label: __address__

  # host resource metrics from autoscaled EC2 targets
  - job_name: analysis-node-exporter
    ec2_sd_configs:
      - region: __AWS_REGION__
        port: 9100
        filters:
          - name: tag:__EC2_TAG_KEY__
            values:
              - __EC2_TAG_VALUE__
    relabel_configs:
      - source_labels: [__meta_ec2_instance_state]
        regex: running
        action: keep
      - source_labels: [__meta_ec2_private_ip]
        regex: (.+)
        replacement: ${1}:9100
        target_label: __address__

  # container metrics from autoscaled EC2 targets
  - job_name: analysis-cadvisor
    ec2_sd_configs:
      - region: __AWS_REGION__
        port: 8080
        filters:
          - name: tag:__EC2_TAG_KEY__
            values:
              - __EC2_TAG_VALUE__
    relabel_configs:
      - source_labels: [__meta_ec2_instance_state]
        regex: running
        action: keep
      - source_labels: [__meta_ec2_private_ip]
        regex: (.+)
        replacement: ${1}:8080
        target_label: __address__

  # GPU metrics from autoscaled EC2 targets (if dcgm exporter is running)
  - job_name: analysis-dcgm-exporter
    ec2_sd_configs:
      - region: __AWS_REGION__
        port: 9400
        filters:
          - name: tag:__EC2_TAG_KEY__
            values:
              - __EC2_TAG_VALUE__
    relabel_configs:
      - source_labels: [__meta_ec2_instance_state]
        regex: running
        action: keep
      - source_labels: [__meta_ec2_private_ip]
        regex: (.+)
        replacement: ${1}:9400
        target_label: __address__

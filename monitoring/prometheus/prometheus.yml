global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: analysis-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - api_server:8000

  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080

  # gpu profile 미사용 시 target down으로 보일 수 있습니다.
  - job_name: dcgm-exporter
    static_configs:
      - targets:
          - dcgm-exporter:9400

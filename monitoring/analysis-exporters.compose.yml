services:
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: analysis_node_exporter
    command:
      - "--path.rootfs=/host"
    volumes:
      - "/:/host:ro,rslave"
    ports:
      - "9100:9100"
    restart: always

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: analysis_cadvisor
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports:
      - "8080:8080"
    restart: always

  dcgm-exporter:
    image: nvidia/dcgm-exporter:3.3.8-3.6.0-ubuntu22.04
    container_name: analysis_dcgm_exporter
    profiles:
      - gpu
    cap_add:
      - SYS_ADMIN
    ports:
      - "9400:9400"
    restart: always
